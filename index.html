<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyAjira</title>
     <link rel="stylesheet" href="styles.css" />
<style>
.job-card {
  border: 5px solid #ccc;
  padding: 10px;
  margin-bottom: 10px;
  width: 400px;
  height: 200px;
  color: black;
  border-radius: 10px;
  background-color: white;
  font-size: 15px;
  font-weight: bold;
}

</style>
</head>
<body>
    <header>
    <h1>MyAjira</h1>
    </header>
    <input type="text" id="searchKeyword" placeholder="Search jobs by company or role" />
        <button id="loadJobs">Load Jobs</button>
        <form id="applicationForm">
       <input type="text" id="company" placeholder="Company Name" required autocomplete="off" />
        <input type="text" id="position" placeholder="Position" required autocomplete="off" />
        <input type="text" id="name" placeholder="Full Names" required autocomplete="off" />
        <input type="text" id="email" placeholder="user email" required autocomplete="off" />

            <select id="status" required>
                <option value="">Select Status</option>
                <option value="Apply">Apply</option>
                <option value="Reject">Reject</option>
            </select>
            <button type="submit">proceed</button>
        </form>
        
        
<div id="jobList">
    <div id="data"></div>
</div>
  <script src="script.js"></script>
</body>
</html>
